{% extends "base.html" %}
{% load static %}

{% block title %} Admin login | CropPrediction {% endblock %}

{% block content %}
<div class="container py-5 focus-none">
    <div class="row justify-content-center align-items-center  url" style="min-height: 70vh;">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                            <i class="fa-solid fa-key fs-3"></i> </div>
                        <h2 class="fw-bold">Welcome Back</h2>
                        <p class="text-muted">Login to Admin Dashboard</p>
                    </div>
                    <form method="POST" action="{% url 'admin_login' %}" id="loginForm">
                        {% csrf_token %}
                    
                        <div class="mb-3">
                            <label class="form-label fw-semibold">email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted">
                                    <i class="fa-solid fa-user"></i>
                                </span>
                                <input type="text" name="name" class="form-control bg-light border-start-0" placeholder="Enter username" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted">
                                    <i class="fa-solid fa-lock"></i>
                                </span>
                                <input type="password" id="passwordInput" name="password" 
                                       class="form-control bg-light border-start-0 border-end-0" 
                                       placeholder="••••••••" required>
                                <span class="input-group-text bg-light border-start-0" 
                                      id="togglePassword" style="cursor: pointer;">
                                      <i class="fa-regular fa-eye text-muted"></i>
                                </span>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mb-4 small">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember" name="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-success text-decoration-none">Forgot Password?</a>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-success btn-lg w-100 rounded-3 mb-3 shadow-sm fw-bold">
                            <span id="btnText">Login</span>
                            <span id="btnSpinner" class="d-none">
                                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                                Authenticating...
                            </span>
                        </button>

                        <div class="text-center">
                            <span class="text-muted small">Don't have an account?</span>
                            <a href="{% url 'signup' %}" class="text-success fw-bold small text-decoration-none">Sign Up</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
