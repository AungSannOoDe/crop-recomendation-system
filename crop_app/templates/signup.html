{% extends "base.html" %}
{% load static %}
{% block title %} Create Account {% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center mt-5">
        <div class="col-lg-10">
            <div class="card shadow-lg border-0 overflow-hidden rounded-4">
                <div class="row g-0">
                    <div class="col-lg-5 d-none d-lg-block bg-success d-flex align-items-center justify-content-center text-white p-5 text-center">
                        <div class="mt-5">
                            <h2 class="display-6 fw-bold">Join CropPredict</h2>
                            <p class="lead">Start optimizing your harvest with data-driven insights.</p>
                            <div class="mt-4 fs-1">🌱</div>
                        </div>
                    </div>

                    <div class="col-lg-7 bg-white p-4 p-md-5">
                        <h2 class="fw-bold mb-4">Create Account</h2>
                        
                        <form method="POST" action="{% url 'signup' %}">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Username</label>
                                <input type="text" name="username" class="form-control bg-light" placeholder="johndoe123" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Email Address</label>
                                <input type="email" name="email" class="form-control bg-light" placeholder="name@example.com" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Password</label>
                                    <div class="input-group">
                                        <input type="password" id="passwordInput" name="password" class="form-control bg-light border-end-0" required>
                                        <span class="input-group-text bg-light border-start-0" id="togglePassword" style="cursor: pointer;">
                                            <i class="fa-regular fa-eye text-muted"></i>
                                        </span>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Confirmation Password</label>
                                    <div class="input-group">
                                        <input type="password" id="confirmPasswordInput" name="confirm_password" class="form-control bg-light border-end-0" required>
                                        <span class="input-group-text bg-light border-start-0" id="toggleConfirmPassword" style="cursor: pointer;">
                                            <i class="fa-regular fa-eye text-muted"></i>
                                        </span>
                                    </div>
                                    <div id="validationMessage" class="mt-1 small"></div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success btn-lg w-100 rounded-3 shadow-sm mb-3">
                                Sign Up
                            </button>

                            <p class="text-center text-muted small">
                                Already have an account? <a href="{% url 'login' %}" class="text-success fw-bold text-decoration-none">Login</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


{% endblock %}
